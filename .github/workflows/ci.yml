name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ecosystem-contract:
    name: Ecosystem contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install coordinator
        run: python -m pip install -e .
      - name: Validate ecosystem contract
        run: python .github/scripts/reconcile_ecosystem.py validate

  verify:
    uses: ./.github/workflows/python-package.yml
