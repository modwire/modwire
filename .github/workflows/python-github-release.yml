name: Reusable Python GitHub release

on:
  workflow_call:
    inputs:
      release-tag:
        description: Existing release tag used to create the GitHub Release.
        required: true
        type: string
      artifact-name:
        description: Name of the verified distribution artifact.
        required: false
        type: string
        default: python-package-distributions

permissions:
  contents: write

jobs:
  publish:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes
