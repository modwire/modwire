name: Ecosystem compatibility

on:
  pull_request:
    paths:
      - .github/modwire-ecosystem.yml
      - .github/scripts/reconcile_ecosystem.py
      - .github/workflows/ecosystem-compatibility.yml
      - pyproject.toml
      - src/**
      - tests/**
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix:
    name: Build matrix from ecosystem contract
    runs-on: ubuntu-latest
    outputs:
      compatibility: ${{ steps.contract.outputs.compatibility }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install coordinator
        run: python -m pip install -e .
      - name: Export compatibility matrix
        id: contract
        run: >-
          echo "compatibility=$(python .github/scripts/reconcile_ecosystem.py
          github-matrix)" >> "$GITHUB_OUTPUT"

  verify:
    name: ${{ matrix.consumer }} / ${{ matrix.profile }} / Python ${{ matrix.python-version }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.compatibility) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check out consumer
        if: matrix.repository != github.repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          path: consumer
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install declared dependency profile
        working-directory: ${{ matrix.working-directory }}
        env:
          PROFILE_REQUIREMENTS: ${{ matrix.requirements }}
        run: >-
          python -m pip install -e ".[dev]" $PROFILE_REQUIREMENTS
      - name: Run integration tests
        working-directory: ${{ matrix.working-directory }}
        run: python -m pytest
