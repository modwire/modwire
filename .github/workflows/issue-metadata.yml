name: Reusable issue metadata validation

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    name: Issue metadata
    runs-on: ubuntu-latest
    steps:
      - name: Validate required native metadata
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          api_version="2026-03-10"
          marker="<!-- modwire-issue-metadata -->"
          required_fields=("Horizon" "Priority" "Risk" "Component" "Release train" "Effort")

          issue="$(gh api \
            -H "X-GitHub-Api-Version: ${api_version}" \
            "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}")"
          issue_type="$(jq -r '.type.name // .type // empty' <<<"${issue}")"
          field_values="$(gh api \
            -H "X-GitHub-Api-Version: ${api_version}" \
            "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/issue-field-values")"

          missing=()
          if [[ -z "${issue_type}" ]]; then
            missing+=("Type")
          fi
          for field in "${required_fields[@]}"; do
            if ! jq -e --arg field "${field}" \
              'any(.[]; .issue_field_name == $field and .value != null and .value != "")' \
              <<<"${field_values}" >/dev/null; then
              missing+=("${field}")
            fi
          done

          comments="$(gh api --paginate \
            -H "X-GitHub-Api-Version: ${api_version}" \
            "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments")"
          comment_id="$(jq -r --arg marker "${marker}" \
            '[.[] | select(.user.type == "Bot" and (.body | contains($marker)))] | first | .id // empty' \
            <<<"${comments}")"

          if ((${#missing[@]})); then
            checklist=""
            for field in "${missing[@]}"; do
              checklist+="- [ ] ${field}"$'\n'
            done
            body="${marker}
          This issue is staying in **Inbox** because required native metadata is missing:

          ${checklist}
          Set the pinned fields in the issue sidebar. Use native **blocked by / blocking** and **parent / sub-issue** relationships where applicable. Agents must ask for uncertain values instead of guessing."
            gh issue edit "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --add-label needs-metadata
            if [[ -n "${comment_id}" ]]; then
              gh api --method PATCH \
                -H "X-GitHub-Api-Version: ${api_version}" \
                "repos/${REPOSITORY}/issues/comments/${comment_id}" \
                -f body="${body}" >/dev/null
            else
              gh issue comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body "${body}"
            fi
            printf 'Missing metadata: %s\n' "${missing[*]}" >>"${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          gh issue edit "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --remove-label needs-metadata || true
          if [[ -n "${comment_id}" ]]; then
            body="${marker}
          Required issue metadata is complete."
            gh api --method PATCH \
              -H "X-GitHub-Api-Version: ${api_version}" \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              -f body="${body}" >/dev/null
          fi
          echo "Required issue metadata is complete." >>"${GITHUB_STEP_SUMMARY}"
