name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build release distributions
    uses: ./.github/workflows/python-release-build.yml
    with:
      release-tag: ${{ github.event.release.tag_name }}

  publish-github-assets:
    name: Attach distributions to GitHub release
    needs: build
    uses: ./.github/workflows/python-release-assets.yml
    with:
      release-tag: ${{ github.event.release.tag_name }}
    permissions:
      contents: write

  publish-pypi:
    name: Publish distributions to PyPI
    needs:
      - build
      - publish-github-assets
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/modwire/
    permissions:
      id-token: write
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
