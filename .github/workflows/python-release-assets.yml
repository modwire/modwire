name: Reusable Python release assets

on:
  workflow_call:
    inputs:
      release-tag:
        description: Published GitHub Release tag receiving the distributions.
        required: true
        type: string
      artifact-name:
        description: Name of the verified distribution artifact.
        required: false
        type: string
        default: python-package-distributions

permissions:
  contents: write

jobs:
  publish:
    name: Attach distributions to GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
