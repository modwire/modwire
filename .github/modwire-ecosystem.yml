version: 2

packages:
  core:
    repository: 9orky/modwire
    distribution: modwire
    component: Core
    role: coordinator
    lifecycle: active
    summary: Typed coordination library and ecosystem integration gate.
    depends_on: [extraction, mermaid, siren]
  cli:
    repository: 9orky/modwire-cli
    distribution: modwire-cli
    component: CLI
    role: runtime
    lifecycle: active
    summary: Command-line runtime and user-facing workflows.
    depends_on: [core]
  extraction:
    repository: 9orky/modwire-extraction
    distribution: modwire-extraction
    component: Extraction
    role: building_block
    lifecycle: active
    summary: Canonical source extraction and normalization.
  mermaid:
    repository: 9orky/modwire-mermaid
    distribution: modwire-mermaid
    component: Mermaid
    role: building_block
    lifecycle: active
    summary: Typed, deterministic Mermaid source generation.
  siren:
    repository: 9orky/modwire-siren
    distribution: modwire-siren
    component: Siren
    role: building_block
    lifecycle: active
    summary: Typed Siren hypermedia and OpenAPI integration.
  mcp:
    repository: 9orky/modwire-mcp
    distribution: modwire-mcp
    component: MCP
    role: integration
    lifecycle: incubating
    summary: MCP surface and future home of scaffolding operations.
    depends_on: [core]

project:
  owner: 9orky
  title: Modwire Ecosystem
  number: 4
  visibility: public
  default_package: core
  description: Cross-repository roadmap and release coordination for the Modwire ecosystem.
  governance_url: https://github.com/9orky/modwire/blob/main/docs/governance/github-ecosystem.md

fields:
  Status:
    type: single_select
    options: [Inbox, Ready, In progress, Blocked, Review, Done]
  Horizon:
    type: single_select
    options: [Now, Next, Later]
  Priority:
    type: single_select
    options: [P0, P1, P2, P3]
  Component:
    type: single_select
    source: packages
  Release train:
    type: text
  Target date:
    type: date
  Risk:
    type: single_select
    options: [Low, Medium, High]

views:
  - name: Roadmap
    layout: roadmap
    group_by: Release train
    slice_by: Component
  - name: Now
    layout: board
    filter: "Horizon:Now -Status:Done"
    group_by: Status
  - name: By package
    layout: table
    filter: "-Status:Done"
    group_by: Repository
  - name: Blocked
    layout: table
    filter: "Status:Blocked"
    group_by: Component
  - name: Release readiness
    layout: table
    filter: "has:\"Release train\" -Status:Done"
    group_by: Release train
  - name: Inbox
    layout: table
    filter: "Status:Inbox"

labels:
  "type:bug":
    color: "d73a4a"
    description: Incorrect existing behavior
  "type:feature":
    color: "0e8a16"
    description: New user-facing capability
  "type:maintenance":
    color: "c5def5"
    description: Internal maintenance
  "type:docs":
    color: "0075ca"
    description: Documentation
  ecosystem:
    color: "5319e7"
    description: Cross-package coordination
  contract:
    color: "1d76db"
    description: Public contract or compatibility work
  breaking:
    color: "b60205"
    description: Backward-incompatible change
  blocked:
    color: "e99695"
    description: Blocked by another decision or delivery
  release-gate:
    color: "fbca04"
    description: Must complete before a release

automation:
  auto_add_filter: "is:open"
  added_status: Inbox
  closed_status: Done
  merged_status: Done
  archive_filter: "Status:Done updated:<@today-30d"

milestones:
  scope: repository
  naming: "<version-or-phase>: <outcome>"
  close_when_complete: true
  ecosystem_coordination_field: Release train
  cross_repository_work: parent_issue_in_modwire_with_sub_issues

cadence:
  triage: weekly
  roadmap_review: monthly
  release_readiness: before_each_package_release
  project_status_update: monthly
