version: 1

project:
  owner: 9orky
  title: Modwire Ecosystem
  default_repository: 9orky/modwire
  repositories:
    - 9orky/modwire
    - 9orky/modwire-extraction
    - 9orky/modwire-mermaid
    - 9orky/modwire-siren
    - 9orky/modwire-mcp

fields:
  Status:
    type: single_select
    options: [Inbox, Ready, In progress, Blocked, Review, Done]
  Horizon:
    type: single_select
    options: [Now, Next, Later]
  Priority:
    type: single_select
    options: [P0, P1, P2, P3]
  Component:
    type: single_select
    options: [Core, Extraction, Mermaid, Siren, MCP]
  Release train:
    type: text
  Target date:
    type: date
  Risk:
    type: single_select
    options: [Low, Medium, High]

views:
  - name: Roadmap
    layout: roadmap
    group_by: Release train
    slice_by: Component
  - name: Now
    layout: board
    filter: "Horizon:Now -Status:Done"
    group_by: Status
  - name: By package
    layout: table
    filter: "-Status:Done"
    group_by: Repository
  - name: Blocked
    layout: table
    filter: "Status:Blocked"
    group_by: Component
  - name: Release readiness
    layout: table
    filter: "has:\"Release train\" -Status:Done"
    group_by: Release train
  - name: Inbox
    layout: table
    filter: "Status:Inbox"

labels:
  "type:bug": "Incorrect existing behavior"
  "type:feature": "New user-facing capability"
  "type:maintenance": "Internal maintenance"
  "type:docs": "Documentation"
  ecosystem: "Cross-package coordination"
  contract: "Public contract or compatibility work"
  breaking: "Backward-incompatible change"
  blocked: "Blocked by another decision or delivery"
  release-gate: "Must complete before a release"

automation:
  auto_add_filter: "is:open"
  added_status: Inbox
  closed_status: Done
  merged_status: Done
  archive_filter: "Status:Done updated:<@today-30d"

milestones:
  scope: repository
  naming: "<version-or-phase>: <outcome>"
  close_when_complete: true
  ecosystem_coordination_field: Release train
  cross_repository_work: parent_issue_in_modwire_with_sub_issues

cadence:
  triage: weekly
  roadmap_review: monthly
  release_readiness: before_each_package_release
  project_status_update: monthly
