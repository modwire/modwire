[build-system]
requires = ["setuptools>=77", "setuptools-scm[toml]>=8", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "modwire"
description = "Extract source-code dependencies and build dependency graphs."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dynamic = ["version"]
authors = [
    {name = "Tomasz Szpak"},
]
keywords = [
    "architecture",
    "code-analysis",
    "dependency-graph",
    "static-analysis",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "pydantic>=2.8",
]

[project.urls]
Homepage = "https://github.com/9orky/modwire"
Repository = "https://github.com/9orky/modwire"
Issues = "https://github.com/9orky/modwire/issues"

[project.optional-dependencies]
dev = [
    "build>=1.2",
    "pytest>=8.0",
    "ruff>=0.8",
    "twine>=5.1",
]

[dependency-groups]
dev = [
    "build>=1.2",
    "pytest>=8.0",
    "ruff>=0.8",
    "twine>=5.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
cache_dir = ".dev/pytest_cache"

[tool.ruff]
cache-dir = ".dev/ruff_cache"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
modwire = [
    "extractors/scripts/*",
]

[tool.setuptools_scm]
fallback_version = "0.0.0.dev0"
local_scheme = "no-local-version"
version_file = "src/modwire/_version.py"
