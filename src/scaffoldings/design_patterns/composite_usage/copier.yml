_min_copier_version: "9.0.0"
_templates_suffix: ".jinja"
_subdirectory: templates

package_name:
  type: str
  default: sample_composite
  help: Package that uses an existing Composite pattern library.

library_package:
  type: str
  default: composite_core
  help: Existing library package to import.

library_namespace:
  type: str
  default: CompositeCore
  help: Existing library namespace to import.

usage_namespace:
  type: str
  default: SampleComposite
  help: Namespace for the package using the Composite library.

component_name:
  type: str
  default: CompositeComponent
  help: Base component abstraction provided by the library.

composite_name:
  type: str
  default: CompositeNode
  help: Composite container class provided by the library.

leaf_name:
  type: str
  default: TextLeaf
  help: Concrete leaf class generated in the usage package.

factory_name:
  type: str
  default: SampleCompositeFactory
  help: Factory that assembles a complete composite object.
