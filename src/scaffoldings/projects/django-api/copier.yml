_min_copier_version: "9.0.0"
_templates_suffix: ".jinja"
_subdirectory: templates

project_name:
  type: str
  default: new_project
  help: Python distribution name.

project_package:
  type: str
  default: core
  help: Importable Django project package.

project_title:
  type: str
  default: New Project
  help: API title.

base_app:
  type: str
  default: new_app
  help: Base Django app that owns shared project conventions.

package_manager:
  type: str
  default: uv
  choices:
    - uv
    - poetry
    - pdm
  help: Package manager used by generated Makefile jobs.

dependencies:
  type: yaml
  when: false
  default:
    - dj-database-url
    - django
    - django-health-check
    - django-model-utils
    - django-ninja-extra
    - gunicorn
    - pgvector
    - psycopg[binary]
    - pydantic
    - python-dotenv
    - pyyaml
    - structlog
    - wireup

dev_dependencies:
  type: yaml
  when: false
  default:
    - openapi-python-client
    - pytest
    - pytest-django
    - ruff
