_min_copier_version: "9.0.0"
_templates_suffix: ".jinja"
_subdirectory: template

project_name:
  type: str
  default: acme
  help: Human-readable project name.

package_name:
  type: str
  default: acme
  help: Importable Python package name.

profile_name:
  type: str
  default: python-fastapi-ddd-uv
  help: Modwire project profile name.

architecture:
  type: str
  default: ddd_context
  help: Architecture profile used by the project.

module_scaffolding:
  type: str
  default: ddd_context
  help: Module scaffolding used by project operations.

language:
  type: str
  default: python
  help: Project language.

language_version:
  type: str
  default: "3.13"
  help: Minimum Python version.

package_manager:
  type: str
  default: uv
  help: Package manager.

framework:
  type: str
  default: fastapi
  help: Application framework.

dependencies:
  type: yaml
  default:
    - fastapi[standard]
    - pydantic-settings
    - typer
  help: Runtime dependencies.

dev_dependencies:
  type: yaml
  default:
    - pytest
    - ruff
    - mypy
    - openapi-python-client
  help: Development dependencies.

scripts:
  type: yaml
  default:
    dev: "fastapi dev src/{{ package_name }}/main.py"
    test: pytest
    lint: ruff check .
    typecheck: mypy src
    openapi-client: "openapi-python-client generate --path openapi/openapi.yaml --output-path src/{{ package_name }}/infrastructure/clients/generated"
  help: Tool commands for this project profile.

operations:
  type: yaml
  default:
    - add_module
    - add_crud_resource
    - add_use_case
    - remove_resource
    - add_openapi_client
  help: Project operations exposed by this authority.

project_authority_json:
  type: str
  default: "{}"
  help: Resolved Modwire project authority JSON.
