contract_version: 1
variables:
  ecosystem: modwire
  repository: example-mcp
  distribution: example-mcp
  import_package: core
  source_root: .
  language: python
  repository_kind: mcp-django
  modules:
    - name: shared
      path: shared
      dependencies: []
      layers: []
    - name: scaffoldings
      path: scaffoldings
      dependencies:
        - shared
      layers:
        - api
        - services
        - models
  exclusions:
    - "*/migrations/**"
    - shared/oa/**
expected_paths:
  - path: pyproject.toml
    owner: uv-package
  - path: uv.lock
    owner: uv-package
  - path: core/__init__.py
    owner: uv-package
  - path: .modwire/repository.yaml
    owner: modwire-repository
  - path: .modwire/shape.yaml
    owner: modwire-repository
  - path: .modwire/boundaries.yaml
    owner: modwire-repository
  - path: shared/__init__.py
    owner: modwire-repository
  - path: scaffoldings/__init__.py
    owner: modwire-repository
extension_points:
  django_project_package: core
  django_apps:
    - scaffoldings
  framework_files:
    owner: existing-repository
    examples:
      - manage.py
      - core/settings.py
      - core/urls.py
